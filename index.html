    <style>
        :root {
            --berkeley-blue: #052f5fff;
            --indigo-dye: #005377ff;
            --jungle-green: #06a77dff;
            --rose-quartz: #bcabaeff;
            --mountbatten-pink: #8b728eff;
            --amaranth: #d1495bff;
        }

        body,
        html {
            height: 100%;
            display: block;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            font-family: 'Public Sans', sans-serif;
            background-color: var(--berkeley-blue);
            line-break: strict;

        }

        * {
            margin: 0;
            user-select: none;
            transition: 0.3s;

        }

        section {
            height: 100%;
            width: 40%;
            float: left;
            outline-offset: -10px;
            outline: var(--amaranth) solid 5px;
        }

        .picture {
            height: 100%;
            width: 60%;
            background: no-repeat url("./img/IMG_9980.jpg");
            float: right;
            background-size: cover;
            background-position: center center;
        }

        @media (max-width: 888px) {
            section {
                order: 2;
                width: 100%;
                height: 40vh;
            }

            .picture {
                order: 1;
                width: 100%;
                height: 60vh;
            }
        }




        main {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            outline-offset: -15px;
            outline: var(--amaranth) solid 5px;
            backdrop-filter: blur(10px);


        }

        header {
            color: var(--jungle-green);
            text-align: center;
        }

        h1 {
            font-size: 60px;
            text-transform: uppercase;
        }

        h1:hover {
            filter: brightness(110%);
        }

        h4 {
            font-size: 20px;
            filter: brightness(70%);
        }

        h4:hover {
            filter: brightness(77%);
        }

        .icons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            /* Center horizontally */
            align-items: center;
            /* Center vertically */
            gap: 20px;
        }

        a {
            width: 50px;
            height: 50px;
            background-color: var(--indigo-dye);
            border-radius: 50%;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icons:hover a:not(:hover) {
            filter: brightness(70%);

        }

        .icons a:hover {
            background-color: var(--jungle-green);
            box-shadow: 3px 2px 3px var(--mountbatten-pink);
        }

        .icons a svg {
            height: 100%;
            width: 100%;
            fill: var(--rose-quartz);
        }

        .icons a p {
            height: 100%;
            width: 100%;
            color: var(--rose-quartz);
            text-decoration: none;
            font-size: 40px;
            text-align: center;
            vertical-align: middle;
            line-height: 50px;
            margin: 0;
            padding-left: -1px;
        }
    </style>
</head>
